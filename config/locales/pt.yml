  importing:
    title: Importar scripts
    intro: "%{site_name} pode importar scripts já alojados noutro local, por exemplo num sistema de controlo de versões (como GitHub), no seu próprio servidor ou noutro site de alojamento de scripts de utilizador."
    url_entry_label: Forneça os URLs de onde importar, separados por quebras de linha. Estes devem ser URLs para os ficheiros JS ou CSS em bruto.
    language:
      label: Em que idioma estão os URLs acima?
      detect: Detetar com base na extensão, com predefinição para JavaScript
      js: JavaScript
      css: CSS
    sync_type_label: "Após a importação inicial, o(s) script(s) deve(m) ser sincronizado(s):"
    additional_info_html: |
        <p>Para scripts em controlo de versões, garanta que o URL utilizado se refere a um ramo e não a um commit específico; caso contrário, nunca será atualizado. Por exemplo, <code>https://bitbucket.org/username/reponame/raw/<b>branch-name</b>/script.user.js</code> em vez de <code>https://bitbucket.org/username/reponame/raw/<b>commit-hash</b>/script.user.js</code>.</p>
        <p>Os scripts importados do GitHub, Bitbucket ou GitLab também podem ser configurados para sincronizar através de um webhook. Um webhook fará com que os seus scripts sejam atualizados imediatamente em %{site_name} quando fizer push para o repositório. Se quiser utilizar um webhook mas ainda não o tiver configurado, faça primeiro a importação e depois %{webhook_info_link:configure o webhook a seguir}.</p>
    submit: Importar

  webhooks:
    info:
      title: Configurar um webhook
      intro_html: |
          <p>Um webhook ligado a %{site_name} permite atualizar %{site_name} automaticamente com base no que acontece no seu repositório. %{site_name} suporta webhooks de "push" para GitHub, GitLab e Bitbucket, e webhooks de "release" para GitHub e GitLab.</p>
          <p>Para utilizar esta funcionalidade, tem de ter scripts em %{site_name} configurados para sincronizar por URL com o seu repositório. Pode adicionar novos scripts %{import_link:ao importar novos scripts para %{site_name}}, ou pode configurar scripts já publicados para sincronizar acedendo ao separador "Administração" na página do script.</p>
          <p>Os seus scripts continuarão a mostrar um tipo de sincronização "Automática" ou "Manual" até ocorrer o primeiro webhook.</p>
      already_syncing_list: "Aqui estão os scripts que já configurou para sincronizar a partir de um fornecedor suportado:"
      synced_item_html: "%{script_name} - sincronização %{sync_type} a partir de %{sync_url}"
      language_note: Como a interface do GitHub, GitLab e Bitbucket está em inglês, as instruções abaixo também serão fornecidas em inglês.
  help:
    sections:
      usage: Utilização
      development: Desenvolvimento
      miscellaneous: Diversos
    open_source: "%{site_name} é código aberto (licenciado sob GPLv3). Pode %{github_link:ver o código-fonte no GitHub}."
    installing_user_scripts:
      title: 'Como instalar scripts de utilizador'
    installing_user_styles:
      title: 'Como instalar estilos de utilizador'
      content_html: |
          <p>Alguns scripts em %{site_name} podem ser instalados como estilos de utilizador.</p>
          <p>Os estilos de utilizador podem ser instalados com %{stylus_firefox_link:Stylus para Firefox}, %{stylus_chrome_link:Stylus para Chrome} e %{stylus_opera_link:Stylus para Opera}.</p>
          <p>%{styles_link:Ver todos os estilos de utilizador disponíveis.}</p>
    meta_keys:
      title: "Chaves meta de script lidas por %{site_name}"
      intro_html: "Esta é uma lista de <a href=\"http://wiki.greasespot.net/Metadata_Block\">chaves meta de scripts de utilizador</a> que %{site_name} irá ler. Chaves fora desta lista podem ser incluídas nos scripts e estarão presentes no script instalado, mas não terão qualquer efeito na interface de %{site_name}."
      name: "O nome do script, utilizado como cabeçalho e nos links. Obrigatório."
      name_localized_html: "O nome do script numa localização específica, em que XX é um <a href=\"http://www.loc.gov/standards/iso639-2/php/code_list.php\">código ISO 639-1 de 2 letras</a> e YY é um <a href=\"https://www.iso.org/obp/ui/#search\">código de país ISO 3166</a> opcional. Substitui <code>@name</code> quando o utilizador está a navegar numa localização correspondente."
      description: "Uma descrição do que o script faz. Mostrada como texto por baixo do nome do script. Obrigatório."
      description_localized_html: "A descrição do script numa localização específica, em que XX é um <a href=\"http://www.loc.gov/standards/iso639-2/php/code_list.php\">código ISO 639-1 de 2 letras</a> e YY é um <a href=\"https://www.iso.org/obp/ui/#search\">código de país ISO 3166</a> opcional. Substitui <code>@description</code> quando o utilizador está a navegar numa localização correspondente."
      namespace_html: "Uma combinação de <code>@namespace</code> e <code>@name</code> é utilizada pelos gestores de scripts de utilizador para verificar se um script já está instalado. %{site_name} exige este campo e avisará se ele for alterado numa atualização."
      version: "Identificador de uma versão específica de um script no %{version_format_link:formato de versão Mozilla}. A versão é mostrada na página de informação de um script. %{site_name} exige este campo e avisará se ele for diminuído ou se não estiver presente."
      include_html: "Descreve em que páginas o script será executado. Esta lista será processada, mostrada na página de informação do script e utilizada para categorizar scripts. Todos os scripts têm de ter pelo menos um <code>@match</code> ou <code>@include</code>. <a href=\"https://wiki.greasespot.net/Include_and_exclude_rules\">Leia aqui sobre o formato.</a>"
      require_html: "Inclui JavaScript externo num script. Veja as %{external_script_link:regras relativas a código que inclui scripts externos}. Se utilizar hashes de integridade de subrecurso (veja a informação %{tm_subresource_link:aqui} e %{mdn_subresource_link:aqui}), %{site_name} avisá-lo-á se os seus hashes não corresponderem ao conteúdo do URL que utiliza."
      resource_html: "Inclui um recurso externo (JavaScript, CSS, imagens, etc.) num script. Veja as %{external_script_link:regras relativas a código que inclui scripts externos}. Se utilizar hashes de integridade de subrecurso (veja a informação %{tm_subresource_link:aqui} e %{mdn_subresource_link:aqui}), %{site_name} avisá-lo-á se os seus hashes não corresponderem ao conteúdo do URL que utiliza."
      updateURL: "Descreve como os gestores de scripts de utilizador devem obter atualizações. %{site_name} removerá estas chaves, o que faz com que qualquer script instalado a partir de %{site_name} só atualize a partir de %{site_name}."
      license_html: |
          Ao publicar o seu script em %{site_name}, dá permissão a outras pessoas para o instalar e utilizar. A licença descreve se e como as pessoas podem modificar e distribuir o seu script. A licença é mostrada na página de informação do script. <code>@license</code> pode ser:
          <ul>
          <li>O nome de uma licença (por exemplo, <code>@license GPL3</code>). Recomenda-se a utilização de um "Nome completo" ou "Identificador" da %{spdx_link:Lista de Licenças SPDX}.</li>
          <li>As condições em que permite a utilização (por exemplo, <code>@license Pode modificar desde que me atribua crédito</code>), embora se recomende a utilização de uma licença já existente.</li>
          <li>Uma declaração de direitos de autor (por exemplo, <code>@license Copyright MeuNome</code>) se não quiser disponibilizar o script ao abrigo de uma licença.</li>
          <li>Ser totalmente omitida, o que equivale a ter uma declaração de direitos de autor, mas é menos claro para os utilizadores.</li>
          </ul>
          Note que, se o seu script se basear em código escrito por outra pessoa, poderá estar limitado na licença que pode escolher.
      supportURL: "URL de uma página onde os utilizadores podem obter apoio sobre um script (por exemplo, um rastreador de erros, um fórum ou um endereço de e-mail). O URL de apoio é mostrado na página de feedback do script."
      contributionURL_html: "URL de uma página onde os utilizadores podem fazer um donativo ao autor de um script. O URL de contribuição é mostrado na página de feedback de um script. Os URLs podem utilizar os protocolos http, https ou Bitcoin. Para criar um link para uma página de donativos do PayPal, utilize um URL no formato <a href=\"https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=your.email.here@example.com&item_name=Greasy+Fork+donation\">https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=your.email.here@example.com&item_name=Greasy+Fork+donation</a>, substituindo o endereço de e-mail de exemplo pelo seu."
      contributionAmount_html: "Valor sugerido para donativo, utilizado em conjunto com <code>@contributionURL</code>."
      compatible_html: "Marca este script como compatível com um navegador. A informação de compatibilidade será mostrada na página do script. Comentários sobre compatibilidade podem ser incluídos no formato <code>@compatible firefox Must disable pop-up blocker</code>. Os navegadores reconhecidos são: %{browsers}."
      incompatible_html: "Marca este script como incompatível com um navegador. A informação de compatibilidade será mostrada na página do script. Comentários opcionais sobre compatibilidade podem ser incluídos no formato <code>@incompatible firefox Broken since Firefox 23</code>. Os navegadores reconhecidos são: %{browsers}."
      antifeature_html: |
          Divulga funcionalidades num script que existem em benefício do autor e não do utilizador. O formato desta chave é <code>@antifeature type description</code>. <i>type</i> é obrigatório e <i>description</i> é opcional. %{antifeatures_link:Leia aqui} mais informação sobre os <i>type</i>s reconhecidos por %{site_name}.
      antifeature_localized_html: "Uma <code>@antifeature</code> descrita numa localização específica, em que XX é um <a href=\"http://www.loc.gov/standards/iso639-2/php/code_list.php\">código ISO 639-1 de 2 letras</a> e YY é um <a href=\"https://www.iso.org/obp/ui/#search\">código de país ISO 3166</a> opcional. Substitui <code>@antifeature</code>s do mesmo tipo quando o utilizador está a navegar numa localização correspondente."
    writing_user_scripts:
      title: "Como escrever scripts de utilizador"
      content_html: "<p>Escrever scripts de utilizador exige conhecimentos de JavaScript. Os <a href=\"http://wiki.greasespot.net/Tutorials\">tutoriais na GreaseSpot Wiki</a> devem dar-lhe um bom ponto de partida sobre JavaScript em geral e sobre a sua relação com scripts de utilizador. Inspecionar scripts de outras pessoas pode ser útil. Poderá interessar-lhe %{code_rules_link} e %{meta_keys_link}. Se quiser ajuda a desenvolver o seu script, sinta-se à vontade para %{ask_in_forum_link}.</p><p>Para publicar em %{site_name}, terá de criar uma conta. A partir da sua %{user_page_link}, siga o link para %{post_new_script_link}.</p>"
      ask_in_forum_link_text: 'pergunte no fórum'
      user_page_link_text: 'página do utilizador'
      post_new_script_link_text: 'publicar um novo script'
    code_rules:
      title: "Regras do %{site_name} para scripts publicados"
      preamble: Estes são os requisitos para scripts publicados em %{site_name}. Destinam-se a manter %{site_name} como um local seguro e útil para scripts de utilizador. Qualquer script fora destes requisitos pode ser eliminado pelos moderadores de %{site_name}.
      functionality_header: Funcionalidade
      description: Os scripts têm de incluir uma descrição do que fazem e não podem fazer coisas de forma desrazoável fora dessa descrição. Os utilizadores têm de saber o que um script irá fazer antes de o instalar.
      reason: Os scripts têm de ter uma razão para serem scripts. Por exemplo, um script que apenas direciona um utilizador para um site não precisa de ser um script; poderia ser um link. São permitidos scripts que utilizem um serviço web para executar uma ação na página atual (por exemplo, convertê-la de alguma forma).
      monetization_html: São permitidos scripts que contenham funcionalidades em benefício do <em>autor</em> e não do utilizador (como rastreio, anúncios e mineradores), mas essas funcionalidades têm de ser divulgadas com a %{antifeature_link:chave meta <code>@antifeature</code>}.
      code_header: Código
      obfuscation: O código publicado em %{site_name} não pode ser ofuscado nem minificado. Aos utilizadores tem de ser dada a oportunidade de inspecionar e compreender um script antes de o instalar. Se o script for empacotado por uma ferramenta como webpack, tem de ser publicado numa configuração não minificada.
      size_html: |
          Os scripts estão limitados a um tamanho máximo de %{max_code_size}. Os scripts não podem ser minificados para caber abaixo deste limite. Se o seu script se estiver a aproximar deste limite, pode querer considerar:
          <ul>
          <li>Mover dados que não sejam código, como data URIs ou JSON, para fora do script.</li>
          <li>Carregar bibliotecas com <code>@require</code> ou através da %{webpack_externals_link:opção <code>externals</code> do webpack}.</li>
          </ul>
      libraries_html: As bibliotecas utilizadas por um script devem ser incluídas com <code>@require</code>, exceto se existir uma razão técnica válida para não o fazer. Caso uma biblioteca seja incluída inline, tem de incluir informação sobre a origem da biblioteca (por exemplo, um comentário a indicar o URL e/ou o nome e a versão).
      updates: Os scripts não podem verificar atualizações com uma frequência superior a uma vez por dia. Note que a maioria dos gestores de scripts de utilizador trata das atualizações automáticas, pelo que fazê-lo no próprio script é desnecessário. Os scripts também não devem injetar dinamicamente noutra página um script alojado em %{site_name}, pois isso contorna a cache nos gestores de scripts de utilizador.
      hosting: A funcionalidade principal de um script tem de estar no código em %{site_name}. Não é permitido publicar em %{site_name} um script que apenas carregue a maior parte do conteúdo a partir de outro local. Também não é permitida a publicação de URLs alternativos de descarga com a intenção de levar os utilizadores a usar essas fontes alternativas em vez da versão publicada em %{site_name}.
      external_js: "%{external_scripts_link:A utilização de JavaScript externo é limitada.}"
      copyright_header: Direitos de autor
      licensing_html: O seu script tem de respeitar os direitos de autor de outras pessoas. Isto inclui o próprio código e quaisquer recursos (por exemplo, imagens) que utilize. Se tenciona utilizar conteúdo de terceiros, respeite os termos de licenciamento ou obtenha autorização antes de o fazer. As licenças dos scripts são especificadas pela chave meta <code>@license</code>, e pode aprender o que pode e não pode fazer em %{tldr_legal_link:tldrlegal.com}.
      reposts: Mesmo nos casos em que a regra de direitos de autor não é violada, não são permitidas republicações de scripts que já estejam em %{site_name}, a menos que melhorem o original.
      miscellaneous_header: Diversos
      keywords: Os scripts não podem incluir palavras-chave sem relação nem mencionar sites sem relação numa tentativa de melhorar a sua posição na pesquisa.
      adult_content_rule: Os scripts que incluam conteúdo adulto ou se destinem a sites com conteúdo adulto têm de ser marcados como tal para permitir que outros utilizadores escolham se os querem ver.
      reposting_deleted: Não volte a publicar scripts que tenham sido eliminados por violarem regras; utilize antes a função de recurso. Voltar a publicar scripts eliminados pode resultar num banimento.
      advertising_in_description: Os autores de scripts não podem colocar anúncios em páginas do Greasy Fork, por exemplo na descrição de um script. É permitida a promoção da página inicial do autor do script, do repositório de código, Discord, WeChat, etc.
      reporting: Se reparar num script que esteja fora destes parâmetros, denuncie-o através do link Feedback desse script e escolhendo a opção "Denunciar script".
      excessive_updates: Os autores de scripts não podem atualizar scripts excessivamente com o único objetivo de subirem na lista de scripts.
      non_functional_includes_html: Os scripts não podem incluir <code>@include</code>s nem <code>@match</code>es para sites onde não fornecem qualquer funcionalidade.
      content_language: Os nomes, descrições e outros conteúdos dos scripts têm de ser marcados com o idioma correto.
      listing_header: Listagem
    external_scripts:
      title: "A política de %{site_name} sobre scripts externos"
      intro_html: |
          <p>%{site_name} permite a utilização de código externo em casos específicos. Qualquer script que inclua código externo fora do que é permitido está sujeito a remoção. Se encontrar um script a violar estas regras, denuncie-o.</p>
          <p>Note que estas regras só se aplicam a código executável externo. O carregamento de código não executável, por exemplo JSON ou CSS, não está restringido.</p>
      rationale:
        title: Fundamentação
        content_html: |
            <p>Os scripts de utilizador têm a capacidade técnica de carregar e executar outros scripts. Isto pode ser feito de várias formas, incluindo:</p>
            <ul>
            <li>As chaves de metadados %{require_doc_link:<code>@require</code>} e %{resource_doc_link:<code>@resource</code>}.</li>
            <li><code>XmlHttpRequest</code> para descarregar o script e depois <code>eval</code> para o executar.</li>
            <li>Adicionar dinamicamente uma etiqueta <code>&lt;script&gt;</code>.</li>
            <li>A opção %{webpack_externals_link:<code>externals</code>} do Webpack.</li>
            <li>Executar uma atualização do script, quer automaticamente quer direcionando o utilizador para realizar uma ação.</li>
            </ul>
            <p>Embora isto seja uma funcionalidade útil e a maioria dos autores a utilize para fins legítimos, também pode ser usado de forma maliciosa. Um dos princípios centrais de %{site_name} é que o utilizador tem de conseguir inspecionar o código de um script. Scripts externos podem contornar este princípio de várias formas: podem mudar sem aviso ou histórico, podem servir código diferente a pessoas diferentes e podem ser usados para esconder código malicioso no meio de bibliotecas conhecidas. Mesmo que alguém verificasse um script externo e determinasse que é legítimo, isso não seria garantia de que esse script sempre foi ou sempre será legítimo.</p>
      cdns:
        title: Redes de distribuição de conteúdos (CDN)
        content_html: |
            <p>É permitido código proveniente de CDNs. %{cdns_link:Veja uma lista de CDNs reconhecidas.} Este código pode estar minificado, mas não ofuscado.</p>
      sri:
        title: Scripts com hashes de integridade de subrecursos
        content_html: |
            <p>É permitida a utilização de <code>@require</code> e <code>@resource</code> com URLs com %{mdn_sri_link:integridade de subrecurso} no %{tm_sri_link:formato do Tampermonkey}.</p>
      allowed_external_codes:
        heading: Códigos externos permitidos
        content_html: |
            <p>As seguintes são as formas como código externo é permitido em %{site_name}. Salvo indicação em contrário, todas as outras %{code_rules_link:regras relativas a código} aplicam-se ao código externo.</p>
      libraries:
        title: "Bibliotecas de %{site_name}"
        content_html: |
            <p>São permitidos scripts publicados como bibliotecas em %{site_name}. As bibliotecas podem ser criadas escolhendo essa opção ao criar um novo script. Além disso, podem ser configuradas para sincronizar a partir de um URL externo, como um repositório GitHub.</p>
      origin_host:
        title: Injeção de scripts a partir do anfitrião de origem
        content_html: |
            <p>É permitida a injeção de scripts externos no mesmo domínio de onde provêm. Se um script correr em https://example.com e descarregar https://example.com/script.js, modificá-lo e injetar de volta na página, isso é permitido.</p>
            <p>Isto existe porque alguns sites incluem o seu próprio JavaScript de formas que podem ser difíceis de alterar sem esta técnica. Ainda assim, o script resultante continua sujeito a todas as outras regras relativas a código.</p>
    cdns:
      title: CDN permitidas
      content_html: |
          <p>Esta é uma lista de CDNs reconhecidas por %{site_name}. Estas podem ser utilizadas para carregar %{external_code_link:código externo} em scripts publicados em %{site_name}.</p>
          <p>Esta lista é composta por localizações de scripts que:</p>
          <ul>
          <li>São públicas</li>
          <li>Não terão o seu conteúdo alterado frequentemente</li>
          <li>Provavelmente seriam úteis para mais do que um autor de scripts</li>
          </ul>
          <p>Se o script que pretende incluir for uma biblioteca JavaScript (por exemplo, jQuery ou YUI), tente encontrá-lo num dos sites listados abaixo. Em particular, %{cdnjs_link:cdnjs} e %{jsdelivr_link:jsDelivr} disponibilizam uma vasta gama de bibliotecas. Se quiser que seja adicionada uma CDN, %{github_link:faça o pedido no GitHub}. Note que existem %{external_code_link:outras opções} para código externo além das CDNs.</p>

          %{allowed_require_list}
      test_url:
        label: Testar um URL
        result_ok: O URL é permitido
        result_not_ok: O URL não é permitido
    script_rewriting:
      title: "Como %{site_name} irá reescrever os scripts publicados"
      content_html: >
          <p>Os scripts publicados em %{site_name} serão reescritos das seguintes
          formas:</p> <ul> <li>As diretivas <code>@updateURL</code> e <code>@downloadURL</code>
          serão adicionadas ou atualizadas para apontarem para %{site_name}. <code>@installURL</code>
          será removida, se existir.</li> <li>As diretivas <code>@version</code> e
          <code>@namespace</code> serão inseridas se o script não as tiver. Estas
          diretivas são necessárias para uma atualização correta.</li> <li><code>@description</code>
          será inserida se uma nova versão do script não a tiver e se uma versão anterior
          do script a tivesse.</li> <li>As quebras de linha CRLF e CR serão convertidas
          para quebras de linha padrão/estilo Unix.</li> </ul>
    site_feedback_link: "Comunicar um problema ou sugerir uma ideia para o próprio %{site_name}"
    credits:
      title: "Créditos"
      authors_credit: "%{site_name} não seria possível sem os autores que contribuem com scripts."
      developers_credit: "%{site_name} é desenvolvido por %{developers_link:estas pessoas} com a ajuda de todas as pessoas que reportam erros e sugerem melhorias."
      translators_credit: "%{site_name} foi traduzido por %{translators_link:a Greasy Translation Force no Transifex}:"
      icons_credit: "Os ícones dos navegadores são de %{browserlogos}."
      donors_credit: "%{site_name} recebeu apoio financeiro de %{donor_links}. Se quiser prestar apoio financeiro, %{admin_email_link:entre em contacto}."
    help_with_greasymonkey: "Ajuda com o Greasemonkey"
    help_with_tampermonkey: "Ajuda com o Tampermonkey"
    help_with_violentmonkey: "Ajuda com o Violentmonkey"
    contact:
      title: "Contactar alguém"
      content_html: >
          <p>Existem várias formas de falar sobre %{site_name} e sobre os elementos
          nele presentes.</p> <p>Tem uma pergunta ou comentário sobre um script específico
          publicado no site? Nesse caso, publique uma discussão a partir do link no
          separador Feedback da página desse script. Os autores de scripts recebem
          notificações na página da conta sobre quaisquer discussões nos seus scripts.</p>
          <p>Tem uma pergunta ou comentário sobre o próprio %{site_name} ou sobre
          o desenvolvimento de scripts, ou quer que alguém lhe faça um script? %{forum_link:Publicar
          no fórum} dar-lhe-á a maior audiência para a discussão.</p> <p>Tem uma denúncia
          de erro ou uma ideia já bem definida para o próprio %{site_name} (e não
          para um script específico <em>publicado em</em> %{site_name})? %{github_link:Publique-o
          na página do GitHub.}</p> <p>Tem uma pergunta ou comentário privado que
          quer que apenas o administrador veja? %{admin_email_link:Envie um e-mail.}</p>
    privacy_policy:
      title: "Política de privacidade"
      content_html: >
          <p>Esta página descreve a forma como %{site_name} irá registar ou rastrear
          utilizadores. Se tiver alguma preocupação, %{admin_email_link:envie um e-mail
          ao administrador}.</p> <h2>Registos do servidor</h2> <p>%{site_name} regista
          todos os pedidos de forma típica de registos de servidor. A informação registada
          inclui páginas visitadas, endereço IP e cadeia do agente do utilizador.
          Estes registos destinam-se a depuração e análise do servidor. Os dados são
          mantidos durante uma semana. Estes dados não são partilhados nem disponibilizados
          publicamente.</p> <h2>Estatísticas dos scripts</h2> <p>Para gerar estatísticas,
          %{site_name} regista pedidos de instalação e atualização com informação
          de endereço IP. Esta informação é mantida durante um dia e depois agregada
          de forma a deixar de incluir o endereço IP. Os dados específicos do endereço
          IP não são partilhados nem disponibilizados publicamente, mas os dados agregados
          são.</p> <h2>Cookies (quando não tem sessão iniciada)</h2> <p>%{site_name}
          pode definir cookies temporários de sessão para permitir algumas funcionalidades
          do site. Estes cookies não são definidos para persistir e podem ser limpos
          quando o navegador é fechado (dependendo das definições do navegador).</p>
          <h2>Contas de utilizador</h2> <p>%{site_name} exige que os utilizadores
          criem uma conta para publicar scripts, participar em discussões e aceder
          a algumas outras funcionalidades do site. Ao criar uma conta, informação
          como endereço IP, endereço de e-mail e agente do utilizador pode ser armazenada
          permanentemente. Parte desta informação pode ficar visível para outros utilizadores.</p>
          <p>As ações realizadas com sessão iniciada, por exemplo publicar scripts
          e comentários, ficarão visíveis para outros utilizadores.</p> <p>Se a opção
          "Lembrar-me" estiver marcada ao iniciar sessão numa conta, %{site_name}
          irá definir um cookie persistente para manter o estado da sessão.</p> <h2>Scripts
          publicados em %{site_name}</h2> <p>%{site_name} contém conteúdo gerado por
          utilizadores, e os scripts publicados podem conseguir rastrear utilizadores
          se estes instalarem esse script.</p> <h2>Bibliotecas de terceiros</h2> <p>%{site_name}
          pode incluir código de terceiros para recolher estatísticas ou mostrar anúncios
          no site. Estas bibliotecas podem incluir lógica de rastreio.</p>
    user_css_to_user_js:
      title: Conversão de CSS de utilizador para JS de utilizador
      content_html: |
          <p>%{site_name} pode converter CSS de utilizador para o formato JS de utilizador. As regras <code>@-moz-document</code> são convertidas em instruções JavaScript <code>if</code>, construindo o CSS a aplicar. Este CSS é anexado a <code>&lt;head&gt;</code> num elemento <code>&lt;style&gt;</code>.</p>

          <p>A presença de algumas funcionalidades de CSS de utilizador impede a conversão para o formato JS de utilizador. Quando estas funcionalidades são detetadas, a conversão para JS de utilizador não será feita.</p>

          <ul>
          <li>Chaves meta <code>@preprocessor</code> diferentes de <code>default</code></li>
          <li>Chaves meta <code>@var</code></li>
          </ul>

          <p>O JS de utilizador de %{site_name} pode carregar o CSS de forma um pouco diferente do CSS de utilizador.</p>

          <ul>
          <li>No JS de utilizador, o CSS é inserido como último elemento de <code>&lt;head&gt;</code>. No CSS de utilizador, isto pode depender da extensão utilizada. Recomenda-se a utilização de <code>!important</code> para mitigar este problema.</li>
          <li>No JS de utilizador, o CSS será calculado e aplicado uma vez no carregamento da página. A utilização da API de histórico do JavaScript pela página pode fazer com que o CSS não seja aplicado como esperado.</li>
          <li>O JS de utilizador pode não aplicar o CSS a frames ou iframes.</li>
          </ul>

          <p>Se verificar que a conversão para JS de utilizador não funciona, deve escolher a opção para a tornar indisponível ao atualizar o seu CSS de utilizador.</p>
    antifeatures:
      title: Antifuncionalidades
      intro_html: |
          <p>As antifuncionalidades são elementos adicionados aos scripts para beneficiar os autores em vez dos utilizadores, como anúncios ou rastreio. Os scripts com antifuncionalidades são permitidos de acordo com as %{rules_link:regras do %{site_name}}, mas têm de ser marcados com <code>@antifeature</code> no bloco de metadados do script. Isto garante que o utilizador tem conhecimento da antifuncionalidade antes de instalar.</p>
          <p>As antifuncionalidades são especificadas como %{meta_keys_link:chaves meta do script} com o formato <code>@antifeature <i>type</i> <i>description</i></code>. <i>type</i> é obrigatório e <i>description</i> é opcional.</p>
          <p>Esta página descreve os tipos de <code>@antifeature</code> reconhecidos por %{site_name}. Outros tipos podem ser utilizados, mas a presença de uma antifuncionalidade não pode ir contra as %{rules_link:regras do %{site_name}}.</p>
      ads_html: |
          <p>O script insere anúncios nas páginas que o utilizador visita.</p>
          <p>Os seguintes casos <i>não</i> exigem a utilização de <code>@antifeature ads</code>:</p>
          <ul>
          <li>Um script que afeta um site que contém anúncios.</li>
          <li>Um script que cria links para um site com anúncios ou que, de outra forma, direciona o utilizador para esse site, desde que esse site forneça alguma funcionalidade quando integrado com o script.</li>
          <li>Promoção da página inicial do autor do script, repositório de código, Discord, WeChat, etc.</li>
          </ul>
      membership_html: |
          <p>O script exige que o utilizador subscreva um canal, entre num grupo, goste de uma página, etc., para ficar totalmente funcional.</p>

          <p>Os seguintes casos <i>não</i> exigem a utilização de <code>@antifeature membership</code>:</p>

          <ul>
          <li>Um script que afeta a área autenticada de um site, mas o próprio script não exige autenticação adicional.</li>
          <li>Um script em que o apoio é prestado através de uma plataforma que exige adesão, desde que esse apoio não seja necessário para o utilizador ter funcionalidade total.</li>
          <li>Links para o canal, grupo, página, etc. do autor que não afetem a funcionalidade do script.</li>
          </ul>
      miner_html: |
          <p>O script contém um criptominerador ou outro código que utiliza os recursos do utilizador para executar alguma tarefa em benefício do autor do script.</p>
      payment_html: |
          <p>O script exige que o utilizador pague ao autor do script para que este fique totalmente funcional.</p>

          <p>Os seguintes casos <i>não</i> exigem a utilização de <code>@antifeature payment</code>:</p>

          <ul>
          <li>Um script que afeta um site que exige pagamento, mas o próprio script não exige pagamento.</li>
          <li>Um script que pede donativos, desde que o donativo não desbloqueie funcionalidades adicionais.</li>
          </ul>
      referral_link_html: |
          <p>O script executa alguma ação que gera comissão para o autor nas compras. Isto inclui scripts que contenham links de referência/afiliados, reescrevam links existentes para links de referência/afiliados, ou forneçam códigos de cupão que gerem comissão para o autor do script.</p>
      tracking_html: |
          <p>O script inclui código para rastrear a atividade do utilizador. Isto inclui rastreadores como o Google Analytics ou código de rastreio personalizado que comunica a atividade do utilizador ao autor do script.</p>

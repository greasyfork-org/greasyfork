  mailers:
    script_report:
      report_created_offender:
        subject: "O seu script %{script_name} em %{site_name} foi denunciado"
        body_html: |
            <p>
            O seu script %{script_link:%{script_name}} foi denunciado por violar as regras de %{site_name}. O motivo específico indicado foi: %{reason}. Os moderadores irão rever esta denúncia e poderão eliminar o seu script se concordarem que viola as regras. Pode %{report_link:rever esta denúncia} e enviar uma resposta se quiser apresentar um argumento ou explicação.
            </p>
      report_upheld_offender:
        subject: "O seu script %{script_name} em %{site_name} foi eliminado"
        body_html: |
            <p>
            O seu script %{script_link:%{script_name}} em %{site_name} foi eliminado por um moderador e já não está acessível publicamente. Pode %{report_link:rever a denúncia} e %{code_rules_link:rever as regras de %{site_name}}.
            </p>
            <p>
            Se acredita que isto foi um erro, ou se atualizou o script para corrigir o problema, pode %{appeal_link:apresentar recurso} e um moderador irá revê-lo. Não volte a publicar este script; fazê-lo pode resultar num banimento de %{site_name}.
            </p>
      report_dismissed_offender:
        subject: "Uma denúncia sobre o seu script %{script_name} em %{site_name} foi arquivada"
        body_html: |
            <p>
            Uma denúncia sobre o seu script %{script_link:%{script_name}} em %{site_name} foi arquivada por um moderador. O seu script permanecerá ativo. Pode %{report_link:rever esta denúncia}.
            </p>
      report_fixed_offender:
        subject: "Uma denúncia sobre o seu script %{script_name} em %{site_name} foi marcada como resolvida"
        body_html: |
            <p>
            Uma denúncia sobre o seu script %{script_link:%{script_name}} em %{site_name} foi marcada como resolvida por um moderador, por este acreditar que corrigiu o problema. O seu script permanecerá ativo. Pode %{report_link:rever esta denúncia}.
            </p>
      report_rebutted_reporter:
        subject: "Uma denúncia sobre %{script_name} em %{site_name} recebeu uma resposta"
        body_html: |
            <p>
            A sua denúncia sobre %{script_link:%{script_name}} em %{site_name} recebeu uma resposta. Pode %{report_link:rever esta resposta}. Um moderador irá rever a sua denúncia e esta resposta e decidir o resultado.
            </p>
      report_upheld_reporter:
        subject: "Uma denúncia sobre %{script_name} em %{site_name} foi aceite"
        body_html: |
            <p>
            A sua denúncia sobre %{script_link:%{script_name}} em %{site_name} foi aceite por um moderador e o script foi eliminado. Pode %{report_link:rever a denúncia}.
            </p>
      report_script_deleted_reporter:
        subject: "Uma denúncia sobre %{script_name} em %{site_name} foi encerrada"
        body_html: |
            <p>
            A sua denúncia sobre %{script_link:%{script_name}} em %{site_name} foi encerrada porque o script foi eliminado pelo autor. Pode %{report_link:rever a denúncia}.
            </p>
      report_dismissed_reporter:
        subject: "Uma denúncia sobre %{script_name} em %{site_name} foi arquivada"
        body_html: |
            <p>
            A sua denúncia sobre %{script_link:%{script_name}} em %{site_name} foi arquivada por um moderador e o script denunciado permanecerá ativo. Pode %{report_link:rever a denúncia}.
            </p>
      report_fixed_reporter:
        subject: "A sua denúncia sobre %{script_name} em %{site_name} foi marcada como resolvida"
        body_html: |
            <p>
            A sua denúncia sobre %{script_link:%{script_name}} em %{site_name} foi marcada como resolvida por um moderador, por este acreditar que o autor corrigiu o problema. O script permanecerá ativo. Pode %{report_link:rever esta denúncia}.
            </p>
      reported_outro: "Recebeu esta notificação porque diz respeito a uma denúncia sobre um script que submeteu a %{site_name}. %{notification_preferences_link:Gerir as suas preferências de notificações.}"
      reporter_outro: "Recebeu esta notificação porque criou uma denúncia sobre um script em %{site_name}. %{notification_preferences_link:Gerir as suas preferências de notificações.}"
    consecutive_bad_ratings:
      notify:
        subject: "O seu script %{script_name} em %{site_name} recebeu várias avaliações \"Más\"."
        text: |
            O seu script '%{script_name}' em %{site_name} (%{script_url}) recebeu várias avaliações "Más" seguidas.

            O feedback que recebeu em %{feedback_url} pode indicar um problema com o seu script, uma indisponibilidade temporária ou uma alteração ao site subjacente. Reveja o feedback, corrija quaisquer problemas e responda às preocupações levantadas.

            O %{site_name} procura manter uma lista de scripts de elevada qualidade para os utilizadores. Para lidar com scripts avariados ou abandonados, aqueles que recebem várias avaliações "Más" consecutivas sem resposta atempada serão ocultados. Para evitar que o seu script fique oculto, publique uma nova versão ou responda às discussões até %{delete_date}. Se não tomar qualquer medida, continuará a ter a opção de o tornar visível novamente após essa data.
    script_comment:
      subject: "O seu script %{script_name} em %{site_name} recebeu um comentário."
      intro: "O seu script %{script_link:%{script_name}} em %{site_name} recebeu um comentário do utilizador %{commenter_link:%{commenter_name}}:"
      outro: "%{comment_link:Ver e responder a este comentário.} Recebeu esta notificação porque escolheu subscrever discussões sobre os seus scripts. %{notification_preferences_link:Gerir as suas preferências de notificações.}"
    subscribed_discussion:
